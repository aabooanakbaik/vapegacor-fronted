<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VapeGacor</title>
  </head>
  <body>
    <div id="error-display" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; display: none; z-index: 9999; position: relative;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-display').innerText += '\n' + e.message + '\n' + (e.error ? e.error.stack : '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-display').innerText += '\nUnhandled Promise Rejection: ' + e.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
